<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00bcf2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#50e6ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#005a9e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00bcf2;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0078d4;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00bcf2;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1200" height="400" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#bannerClip)">
    <rect width="1200" height="400" fill="url(#bgGrad)"/>

    <!-- Grid pattern -->
    <g opacity="0.04" stroke="#50e6ff" stroke-width="0.5">
      <line x1="0" y1="0" x2="0" y2="400"/><line x1="40" y1="0" x2="40" y2="400"/>
      <line x1="80" y1="0" x2="80" y2="400"/><line x1="120" y1="0" x2="120" y2="400"/>
      <line x1="160" y1="0" x2="160" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
      <line x1="240" y1="0" x2="240" y2="400"/><line x1="280" y1="0" x2="280" y2="400"/>
      <line x1="320" y1="0" x2="320" y2="400"/><line x1="360" y1="0" x2="360" y2="400"/>
      <line x1="400" y1="0" x2="400" y2="400"/><line x1="440" y1="0" x2="440" y2="400"/>
      <line x1="480" y1="0" x2="480" y2="400"/><line x1="520" y1="0" x2="520" y2="400"/>
      <line x1="560" y1="0" x2="560" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
      <line x1="640" y1="0" x2="640" y2="400"/><line x1="680" y1="0" x2="680" y2="400"/>
      <line x1="720" y1="0" x2="720" y2="400"/><line x1="760" y1="0" x2="760" y2="400"/>
      <line x1="800" y1="0" x2="800" y2="400"/><line x1="840" y1="0" x2="840" y2="400"/>
      <line x1="880" y1="0" x2="880" y2="400"/><line x1="920" y1="0" x2="920" y2="400"/>
      <line x1="960" y1="0" x2="960" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
      <line x1="1040" y1="0" x2="1040" y2="400"/><line x1="1080" y1="0" x2="1080" y2="400"/>
      <line x1="1120" y1="0" x2="1120" y2="400"/><line x1="1160" y1="0" x2="1160" y2="400"/>
      <line x1="1200" y1="0" x2="1200" y2="400"/>
      <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="40" x2="1200" y2="40"/>
      <line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/>
      <line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
    </g>

    <!-- Ambient glow orbs -->
    <circle cx="180" cy="200" r="200" fill="url(#glowGrad)" opacity="0.6"/>
    <circle cx="900" cy="100" r="160" fill="#0078d4" opacity="0.04"/>
    <circle cx="1050" cy="320" r="120" fill="#00bcf2" opacity="0.03"/>

    <!-- Decorative circuit lines (left side) -->
    <g stroke="#0078d4" stroke-width="1" opacity="0.12" fill="none">
      <path d="M0,80 L60,80 L80,100 L80,160"/>
      <path d="M0,160 L40,160 L60,140 L120,140 L140,160 L140,200"/>
      <path d="M0,280 L80,280 L100,260 L100,220"/>
      <circle cx="80" cy="160" r="3" fill="#0078d4"/>
      <circle cx="140" cy="200" r="3" fill="#0078d4"/>
      <circle cx="100" cy="220" r="3" fill="#0078d4"/>
    </g>

    <!-- Decorative circuit lines (right side) -->
    <g stroke="#00bcf2" stroke-width="1" opacity="0.1" fill="none">
      <path d="M1200,120 L1140,120 L1120,140 L1120,200"/>
      <path d="M1200,240 L1160,240 L1140,220 L1080,220 L1060,240 L1060,280"/>
      <path d="M1200,320 L1120,320 L1100,300 L1100,260"/>
      <circle cx="1120" cy="200" r="3" fill="#00bcf2"/>
      <circle cx="1060" cy="280" r="3" fill="#00bcf2"/>
      <circle cx="1100" cy="260" r="3" fill="#00bcf2"/>
    </g>

    <!-- Floating security node dots -->
    <g opacity="0.15">
      <circle cx="320" cy="60" r="2" fill="#50e6ff"/>
      <circle cx="480" cy="40" r="1.5" fill="#00bcf2"/>
      <circle cx="700" cy="50" r="2" fill="#0078d4"/>
      <circle cx="850" cy="70" r="1.5" fill="#50e6ff"/>
      <circle cx="950" cy="45" r="2" fill="#00bcf2"/>
      <circle cx="380" cy="350" r="1.5" fill="#50e6ff"/>
      <circle cx="550" cy="370" r="2" fill="#0078d4"/>
      <circle cx="750" cy="360" r="1.5" fill="#00bcf2"/>
      <circle cx="900" cy="345" r="2" fill="#50e6ff"/>
      <circle cx="1020" cy="370" r="1.5" fill="#0078d4"/>
    </g>

    <!-- ═══════════ Shield Icon ═══════════ -->
    <g transform="translate(120, 105)">
      <!-- Shield outer glow -->
      <path d="M60,0 L120,25 L120,85 C120,135 60,180 60,180 C60,180 0,135 0,85 L0,25 Z"
            fill="#0078d4" opacity="0.15" filter="url(#softGlow)"/>

      <!-- Shield body -->
      <path d="M60,8 L112,30 L112,82 C112,126 60,166 60,166 C60,166 8,126 8,82 L8,30 Z"
            fill="url(#shieldGrad)" stroke="#00bcf2" stroke-width="1.5" opacity="0.9"/>

      <!-- Shield inner face -->
      <path d="M60,20 L100,38 L100,78 C100,114 60,148 60,148 C60,148 20,114 20,78 L20,38 Z"
            fill="url(#shieldInner)" stroke="#50e6ff" stroke-width="0.5" opacity="0.6"/>

      <!-- Checkmark inside shield -->
      <g filter="url(#glow)">
        <polyline points="38,85 54,104 84,65"
                  fill="none" stroke="#50e6ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <!-- Lock icon below checkmark (small) -->
      <g transform="translate(45, 115)" opacity="0.5">
        <rect x="0" y="8" width="30" height="22" rx="3" fill="none" stroke="#50e6ff" stroke-width="1.5"/>
        <path d="M7,8 L7,4 C7,0 10,-4 15,-4 C20,-4 23,0 23,4 L23,8"
              fill="none" stroke="#50e6ff" stroke-width="1.5"/>
        <circle cx="15" cy="20" r="3" fill="#50e6ff" opacity="0.6"/>
      </g>
    </g>

    <!-- ═══════════ Main Title ═══════════ -->
    <text x="310" y="168" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="56" font-weight="700" fill="#ffffff" letter-spacing="-1">
      SSPM-O365
    </text>

    <!-- Accent underline -->
    <rect x="312" y="182" width="260" height="3" rx="1.5" fill="url(#accentGrad)" opacity="0.8"/>

    <!-- Subtitle -->
    <text x="310" y="218" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="20" font-weight="400" fill="#a0c4e8" letter-spacing="0.5">
      SaaS Security Posture Management for Microsoft 365
    </text>

    <!-- Description line -->
    <text x="310" y="250" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="14" font-weight="300" fill="#6b8daa" letter-spacing="0.3">
      Live tenant assessment via Microsoft Graph API  |  Read-only  |  24 check groups  |  87+ security rules
    </text>

    <!-- ═══════════ Stat badges ═══════════ -->
    <!-- Badge: Check Groups -->
    <g transform="translate(310, 278)">
      <rect width="130" height="36" rx="8" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>
      <text x="14" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#50e6ff">24</text>
      <text x="46" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#7eb8da">Check Groups</text>
    </g>

    <!-- Badge: Rules -->
    <g transform="translate(454, 278)">
      <rect width="110" height="36" rx="8" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>
      <text x="14" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#50e6ff">87+</text>
      <text x="56" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#7eb8da">Rules</text>
    </g>

    <!-- Badge: Python -->
    <g transform="translate(578, 278)">
      <rect width="110" height="36" rx="8" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>
      <text x="14" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#50e6ff">Python</text>
      <text x="66" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="400" fill="#7eb8da">3.9+</text>
    </g>

    <!-- Badge: Version -->
    <g transform="translate(702, 278)">
      <rect width="100" height="36" rx="8" fill="#0078d4" opacity="0.15" stroke="#0078d4" stroke-width="0.8"/>
      <text x="14" y="23" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#50e6ff">v2.1.0</text>
    </g>

    <!-- ═══════════ Right side: Service icons as text badges ═══════════ -->
    <g transform="translate(880, 100)" opacity="0.7">
      <!-- Entra ID -->
      <rect x="0" y="0" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="50" y="19" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Entra ID</text>

      <!-- Exchange -->
      <rect x="110" y="0" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="160" y="19" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Exchange</text>

      <!-- SharePoint -->
      <rect x="0" y="38" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="50" y="57" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">SharePoint</text>

      <!-- Teams -->
      <rect x="110" y="38" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="160" y="57" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Teams</text>

      <!-- OneDrive -->
      <rect x="0" y="76" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="50" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">OneDrive</text>

      <!-- Intune -->
      <rect x="110" y="76" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="160" y="95" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Intune</text>

      <!-- Defender -->
      <rect x="0" y="114" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="50" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Defender</text>

      <!-- Purview -->
      <rect x="110" y="114" width="100" height="28" rx="6" fill="#0078d4" opacity="0.2" stroke="#0078d4" stroke-width="0.6"/>
      <text x="160" y="133" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
            font-size="11" font-weight="500" fill="#7eb8da">Purview</text>
    </g>

    <!-- ═══════════ Bottom accent bar ═══════════ -->
    <rect x="0" y="392" width="1200" height="8" fill="url(#accentGrad)" opacity="0.6"/>

    <!-- Top thin accent line -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)" opacity="0.4"/>
  </g>
</svg>
